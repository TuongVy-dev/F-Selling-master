<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Bán Hàng Chuyên Nghiệp | F-Selling</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { overflow: hidden; } /* Ngăn cuộn trang chính để tạo cảm giác App */
        .pos-layout {
            display: grid;
            grid-template-columns: 1fr 400px 350px;
            gap: 1rem;
            height: calc(100vh - 90px);
            padding: 1rem;
            box-sizing: border-box;
        }
        @media (max-width: 1200px) {
            .pos-layout { grid-template-columns: 1fr 350px; } /* Ẩn cột checkout riêng thành dạng modal hoặc stack xuống */
        }
        .pos-col {
            background: #1E293B;
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }
        .scroll-area {
            overflow-y: auto;
            flex: 1;
            padding-right: 0.5rem;
        }
        /* Custom Scrollbar */
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        
        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
        }
        .product-card {
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
            position: relative;
        }
        .product-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .product-img { width: 100%; height: 120px; object-fit: cover; }
        .product-info { padding: 0.75rem; text-align: center; color: white; }
        .product-name { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #F8FAFC; }
        .product-price { color: var(--success); font-weight: 700; font-size: 0.95rem; }
        .product-stock { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7); padding: 2px 6px; font-size: 0.7rem; border-radius: 4px; }

        /* Cart Table */
        .cart-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 20px;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 0;
            border-bottom: 1px dashed #334155;
            font-size: 0.9rem;
        }
        .btn-qty { background: #334155; border: none; color: white; padding: 2px 6px; border-radius: 4px; cursor: pointer; }
        .btn-qty:hover { background: var(--primary); }
        .btn-del { color: #EF4444; cursor: pointer; background: transparent; border: none; font-size: 1.1rem; }
        
        /* Checkout Box */
        .checkout-box {
            background: #0F172A;
            padding: 1.25rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            color: #F8FAFC;
        }
        .summary-row {
            display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.95rem; color: #CBD5E1;
        }
        .summary-row.total { font-size: 1.25rem; font-weight: 700; color: var(--success); margin-top: 1rem; border-top: 1px solid #334155; padding-top: 1rem; }
        
        .method-btn {
            background: #1E293B; border: 1px solid #334155; padding: 0.75rem; border-radius: 8px;
            color: white; cursor: pointer; flex: 1; text-align: center; transition: 0.2s;
        }
        .method-btn.active { background: rgba(16, 185, 129, 0.2); border-color: var(--success); color: var(--success); }
        
        .qr-wrapper { text-align: center; background: white; padding: 1rem; border-radius: 8px; margin-top: 1rem; }
        .qr-wrapper img { max-width: 100%; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="nav-bar" style="padding: 0.5rem 1.5rem; background: #0F172A; border-bottom: 1px solid var(--border-color);">
        <h2 class="text-gradient" style="font-size: 1.25rem;"><i class="ph ph-desktop"></i> POS WORKSPACE</h2>
        <div class="flex-row">
            <select id="shopSelect" onchange="changeShopPOS()" style="padding: 0.4rem 1rem; border-radius: 8px; border: 1px solid #334155; background: #1E293B; color: white; margin-right: 1rem; font-weight: 600;">
                <option value="">-- Chọn Cửa Hàng --</option>
            </select>
            <button class="btn-outline" onclick="window.location.href='/seller.html'" style="padding: 0.4rem 1rem;"><i class="ph ph-arrow-left"></i> Quay lại Admin</button>
        </div>
    </div>

    <div class="pos-layout">
        <!-- CỘT 1: SẢN PHẨM -->
        <div class="pos-col">
            <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                <div class="input-wrapper" style="flex: 1; margin: 0;">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="searchProd" placeholder="Tìm sản phẩm / Quét mã vạch..." style="background: #0F172A;">
                </div>
            </div>
            <div class="scroll-area">
                <div id="productGrid" class="product-grid">
                    <!-- Products rendered here -->
                </div>
            </div>
        </div>

        <!-- CỘT 2: GIỎ HÀNG -->
        <div class="pos-col">
            <h3 style="font-size: 1.1rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem; margin-bottom: 0.5rem; color: white;"><i class="ph ph-shopping-cart"></i> Giỏ hàng</h3>
            <div class="scroll-area" id="cartContainer">
                <!-- Cart items -->
            </div>
            
            <!-- Phần Voucher -->
            <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #334155;">
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="voucherInput" placeholder="Nhập mã Khuyến mãi" style="flex: 1; padding: 0.5rem; border-radius: 4px; border: 1px solid #334155; background: #0F172A; color: white; text-transform: uppercase;">
                    <button onclick="applyVoucher()" style="padding: 0.5rem 1rem;"><i class="ph ph-check"></i> Áp dụng</button>
                </div>
                <small id="voucherMsg" style="color: #EF4444; display: block; margin-top: 0.25rem;"></small>
            </div>
        </div>

        <!-- CỘT 3: THANH TOÁN -->
        <div class="pos-col" style="background: #0B1120; overflow-y: auto; padding-right: 0.5rem;">
            <h3 style="font-size: 1.1rem; margin-bottom: 1rem; color: white;"><i class="ph ph-receipt"></i> Thanh Toán</h3>
            
            <div class="checkout-box">
                <div class="summary-row"><span>Tạm tính:</span><span id="txtSubtotal">0 ₫</span></div>
                <div class="summary-row" style="color: #F59E0B;"><span>Giảm giá (Voucher):</span><span id="txtDiscount">- 0 ₫</span></div>
                <div class="summary-row total"><span>Tổng Cần Thu:</span><span id="txtTotal">0 ₫</span></div>
            </div>

            <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                <button class="method-btn active" id="btnMethodQR" onclick="setMethod('transfer')"><i class="ph ph-qr-code"></i><br>VietQR</button>
                <button class="method-btn" id="btnMethodCash" onclick="setMethod('cash')"><i class="ph ph-money"></i><br>Tiền mặt</button>
            </div>

            <button onclick="checkout()" style="width: 100%; padding: 1rem; font-size: 1.1rem; margin-bottom: 1rem;"><i class="ph ph-check-circle"></i> Hoàn tất Đơn Hàng</button>

            <!-- Khối hiện QR sau khi chốt đơn -->
            <div id="qrSection" style="display: none;">
                <hr style="border-color: #334155;">
                <div class="qr-wrapper">
                    <h4 style="color: #000; margin-bottom: 0.5rem;">Khách quét mã thanh toán</h4>
                    <img id="qrImage" src="" alt="QR">
                    <h2 style="color: var(--success); margin: 0.5rem 0;" id="qrTotalTxt"></h2>
                </div>
                <button class="btn-success" style="width: 100%; margin-top: 1rem; padding: 0.75rem;" onclick="confirmPayment()"><i class="ph ph-hand-coins"></i> Xác nhận Đã Nhận Tiền</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="/js/api.js"></script>
    <script>
        if(localStorage.getItem('role') !== 'SELLER') window.location.href = '/';
        let allShops = [];
        let currentShopId = parseInt(localStorage.getItem('currentShopId'));

        let cart = [];
        let products = [];
        let currentVoucher = null;
        let discount = 0;
        let subtotal = 0;
        let total = 0;
        let paymentMethod = 'transfer';
        let currentOrderId = null;

        async function loadShop() {
            try {
                const res = await apiCall('/shops');
                allShops = res.filter(s => s.is_active !== false); // fallback if undefined
                const sel = document.getElementById('shopSelect');
                sel.innerHTML = '<option value="">-- Chọn Cửa Hàng --</option>';
                allShops.forEach(s => {
                    sel.innerHTML += `<option value="${s.id}" ${s.id === currentShopId ? 'selected' : ''}>${s.name}</option>`;
                });
                if(allShops.length > 0 && !currentShopId) {
                    currentShopId = allShops[0].id;
                    localStorage.setItem('currentShopId', currentShopId);
                    sel.value = currentShopId;
                }
                loadProducts();
            } catch(e) {}
        }
        
        function changeShopPOS() {
            const val = document.getElementById('shopSelect').value;
            if(!val) return;
            currentShopId = parseInt(val);
            localStorage.setItem('currentShopId', currentShopId);
            resetPOS();
        }

        async function loadProducts() {
            if(!currentShopId) return;
            try {
                const res = await apiCall(`/products/${currentShopId}`);
                products = res.filter(p => p.is_active !== false);
                renderProducts(products);
            } catch (e) { showToast(e.message); }
        }

        function renderProducts(list) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            list.forEach(p => {
                const imgUrl = p.image_url ? p.image_url : 'https://placehold.co/150x150/1E293B/FFF?text=SP';
                const div = document.createElement('div');
                div.className = 'product-card';
                div.innerHTML = `
                    <div class="product-stock" style="color: white;">Kho: ${p.stock}</div>
                    <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/150x150?text=Error'" class="product-img">
                    <div class="product-info">
                        <div class="product-name" title="${p.name}">${p.name}</div>
                        <div class="product-price">${p.price.toLocaleString()} ₫</div>
                    </div>
                `;
                div.onclick = () => addToCart(p);
                grid.appendChild(div);
            });
        }

        // Tìm kiếm / Quét mã vạch
        document.getElementById('searchProd').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = products.filter(p => (p.code && p.code.toLowerCase() === val) || p.name.toLowerCase().includes(val));
            renderProducts(filtered);
        });

        function addToCart(p) {
            try {
                if(!cart) cart = [];
                if(p.stock <= 0) return showToast("Sản phẩm đã hết hàng!");
                const existing = cart.find(i => i.product_name === p.name);
                if(existing) {
                    if(existing.quantity >= p.stock) return showToast("Vượt quá số lượng tồn kho!");
                    existing.quantity++;
                }
                else cart.push({ product_name: p.name, price: p.price, quantity: 1, max_stock: p.stock });
                calcCart();
            } catch (err) {
                console.error("Lỗi thêm vào giỏ:", err);
                showToast("Lỗi hệ thống khi thêm sản phẩm.");
            }
        }

        function updateQty(index, delta) {
            const item = cart[index];
            if(item.quantity + delta > item.max_stock) return showToast("Vượt quá tồn kho!");
            if(item.quantity + delta <= 0) cart.splice(index, 1);
            else item.quantity += delta;
            calcCart();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            calcCart();
        }

        function calcCart() {
            try {
                if(!cart) cart = [];
                subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                if(currentVoucher) applyVoucher(); // Re-apply voucher logic
                else { discount = 0; total = subtotal; updateUI(); }
            } catch (err) {
                console.error("Lỗi tính tiền:", err);
            }
        }

        async function applyVoucher() {
            const code = document.getElementById('voucherInput').value.toUpperCase();
            if(!code) {
                currentVoucher = null; discount = 0; total = subtotal;
                document.getElementById('voucherMsg').innerText = "";
                updateUI(); return;
            }
            if(subtotal === 0) return;

            const formData = new FormData();
            formData.append('subtotal', subtotal);
            formData.append('voucher_code', code);

            try {
                const res = await fetch(`/api/vouchers/apply/${currentShopId}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${getToken()}` },
                    body: formData
                });
                const data = await res.json();
                if(!res.ok) {
                    currentVoucher = null; discount = 0; total = subtotal;
                    document.getElementById('voucherMsg').innerText = data.detail;
                    document.getElementById('voucherMsg').style.color = '#EF4444';
                } else {
                    currentVoucher = code;
                    discount = data.discount_amount;
                    total = data.new_total;
                    document.getElementById('voucherMsg').innerText = "Áp dụng thành công!";
                    document.getElementById('voucherMsg').style.color = 'var(--success)';
                }
                updateUI();
            } catch(e) { console.log(e); }
        }

        function updateUI() {
            const container = document.getElementById('cartContainer');
            container.innerHTML = '';
            cart.forEach((item, index) => {
                container.innerHTML += `
                    <div class="cart-item">
                        <div style="font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #F8FAFC;" title="${item.product_name}">${item.product_name}</div>
                        <div style="color: var(--success);">${item.price.toLocaleString()}</div>
                        <div style="display: flex; gap: 0.3rem; align-items: center; color: white;">
                            <button class="btn-qty" onclick="updateQty(${index}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="btn-qty" onclick="updateQty(${index}, 1)">+</button>
                        </div>
                        <button class="btn-del" onclick="removeItem(${index})"><i class="ph ph-trash"></i></button>
                    </div>
                `;
            });

            document.getElementById('txtSubtotal').innerText = subtotal.toLocaleString() + ' ₫';
            document.getElementById('txtDiscount').innerText = '- ' + discount.toLocaleString() + ' ₫';
            document.getElementById('txtTotal').innerText = total.toLocaleString() + ' ₫';
        }

        function setMethod(m) {
            paymentMethod = m;
            document.getElementById('btnMethodQR').classList.remove('active');
            document.getElementById('btnMethodCash').classList.remove('active');
            if(m==='transfer') document.getElementById('btnMethodQR').classList.add('active');
            else document.getElementById('btnMethodCash').classList.add('active');
            
            // Hide QR section if switching to cash
            if(m === 'cash') document.getElementById('qrSection').style.display = 'none';
        }

        async function checkout() {
            if(cart.length === 0) return showToast("Giỏ hàng trống!");
            try {
                const body = {
                    items: cart.map(i => ({product_name: i.product_name, price: i.price, quantity: i.quantity})),
                    voucher_code: currentVoucher,
                    payment_method: paymentMethod
                };
                const res = await apiCall(`/orders/${currentShopId}`, 'POST', body);
                currentOrderId = res.order_id;
                
                if(paymentMethod === 'transfer') {
                    document.getElementById('qrImage').src = res.qr_url;
                    document.getElementById('qrTotalTxt').innerText = res.total.toLocaleString() + ' ₫';
                    document.getElementById('qrSection').style.display = 'block';
                    showToast("Tạo đơn thành công! Khách vui lòng quét mã.");
                } else {
                    // Tiền mặt -> auto pay for simplicity or just show success
                    await apiCall(`/orders/${currentOrderId}/pay`, 'POST');
                    showToast("Thu tiền mặt thành công!");
                    resetPOS();
                }
            } catch (e) { showToast(e.message); }
        }

        async function confirmPayment() {
            if(!currentOrderId) return;
            try {
                await apiCall(`/orders/${currentOrderId}/pay`, 'POST');
                showToast("Đã xác nhận tiền vào tài khoản!");
                resetPOS();
            } catch (e) { showToast(e.message); }
        }

        function resetPOS() {
            cart = [];
            currentVoucher = null;
            document.getElementById('voucherInput').value = '';
            document.getElementById('voucherMsg').innerText = '';
            document.getElementById('qrSection').style.display = 'none';
            currentOrderId = null;
            calcCart();
            loadProducts(); // refresh stock
        }

        loadShop();
        loadProducts();
    </script>
</body>
</html>
