<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F-Selling | Đăng nhập</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="glass-card login-box">
            <h1 class="text-gradient" style="text-align: center;">F-Selling</h1>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Đăng nhập vào tài khoản của bạn</p>
            
            <form id="loginForm">
                <div>
                    <label>Tên đăng nhập</label>
                    <input type="text" id="username" required>
                </div>
                <div>
                    <label>Mật khẩu</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" style="width: 100%;">Đăng nhập</button>
                <div id="errorMsg" style="color: #ef4444; margin-top: 1rem; text-align: center;"></div>
            </form>
            <div style="text-align: center; margin-top: 1rem;">
                <p>Chưa có tài khoản? <a href="/register.html" style="color: var(--primary);">Đăng ký Người bán</a></p>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const data = await apiCall('/auth/login', 'POST', { username, password });
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('role', data.role);
                if (data.role === 'ADMIN') {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/seller';
                }
            } catch (err) {
                document.getElementById('errorMsg').innerText = err.message;
            }
        });


    </script>
</body>
</html>
