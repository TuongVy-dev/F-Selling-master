<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F-Selling | Đăng ký</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="login-container">
        <div class="glass-card login-box">
            <img class="logo" src="img/logo.png" alt="">
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Đăng ký tài khoản Người bán mới</p>
            
            <form id="registerForm">
                <div>
                    <label>Tên đăng nhập</label>
                    <input type="text" id="username" required>
                </div>
                <div>
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div>
                    <label>Mật khẩu</label>
                    <input type="password" id="password" required>
                </div>
                <div>
                    <label>Xác nhận Mật khẩu</label>
                    <input type="password" id="confirm_password" required>
                </div>
                <button type="submit" style="width: 100%;">Đăng ký</button>
                <div id="errorMsg" style="color: #ef4444; margin-top: 1rem; text-align: center;"></div>
            </form>
            <div style="text-align: center; margin-top: 1rem;">
                <p>Đã có tài khoản? <a href="/" style="color: var(--primary);">Đăng nhập ngay</a></p>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            if(password !== confirm) {
                return document.getElementById('errorMsg').innerText = "Mật khẩu xác nhận không khớp!";
            }

            const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*(),.?\":{}|<>_]).+$/;
            if (!regex.test(password)) {
                return document.getElementById('errorMsg').innerText = "Mật khẩu phải bao gồm kí tự đặc biệt, chữ hoa, chữ thường và số!";
            }

            try {
                await apiCall('/auth/register', 'POST', { username, email, password, role: 'SELLER' });
                submitBtn.disabled = true;
                localStorage.setItem('register_email', email);
                localStorage.setItem('otp_send_time', Date.now().toString());
                alert("Đăng ký thành công! Đang chuyển hướng về trang xác thực tài khoản...");
                window.location.href = "/verify";
            } catch (err) {
                document.getElementById('errorMsg').innerText = err.message;
            }
        });
    </script>
</body>
</html>
